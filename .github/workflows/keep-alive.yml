name: Keep backend warm

# Pings the FastAPI backend's /health endpoint so the Render free-tier
# instance does not spin down — Render sleeps a free service after ~15 min
# of inactivity, which causes a 30-60s cold start on the next request.
#
# Note: GitHub may delay scheduled runs under load, so the real interval can
# drift past 10 min; for a hard guarantee use a dedicated uptime monitor.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend /health
        run: |
          echo "Pinging backend at $(date -u) ..."
          curl -fsS --max-time 120 --retry 3 --retry-delay 15 --retry-all-errors \
            https://airbnb-price-api.onrender.com/health
          echo ""
          echo "✅ backend is awake"
