# Render Blueprint — deploys the FastAPI backend as a web service.
# Docs: https://render.com/docs/blueprint-spec
#
# ── Before deploying ──────────────────────────────────────────────────────
# saved_models/base_models.pkl is ~162 MB and exceeds GitHub's 100 MB file
# limit, so it is git-ignored. To deploy to Render you must make the model
# available to the build, e.g.:
#   (a) track it with Git LFS:  git lfs track "saved_models/base_models.pkl"
#   (b) host it externally and download it in buildCommand, e.g.:
#       buildCommand: pip install -r requirements.txt &&
#         curl -L "$MODEL_URL" -o ../saved_models/base_models.pkl
# The free instance has 512 MB RAM — loading the full ensemble is tight;
# upgrade to a Starter instance if the service runs out of memory.
# ──────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: airbnb-price-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
